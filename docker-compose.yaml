services:
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    image: pyspark-data-engineering:latest
    container_name: hexdata
    hostname: hexdata

    environment:
      - JUPYTER_TOKEN=
      - JUPYTER_PORT=8888

    ports:
      - "${JUPYTER_PORT:-8888}:8888"

    volumes:
      - ${WORK_DIR:-./work}:/home/hexdata/work
      - .:/home/hexdata/code

    # Mantém o container vivo — jupyter é iniciado manualmente pelo terminal
    command: sleep infinity
